name: Daily Signal Check

on:
  schedule:
    # Run at 8:00 AM ET (13:00 UTC) weekdays — after EIA morning data release
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # Allow manual trigger

env:
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  USE_LIVE_API: 'true'

jobs:
  signal-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run signal check
        run: |
          uv run python scripts/signal_check.py

      - name: Create issue if alerts firing
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('signal_result.json', 'utf8'));
            } catch (e) {
              console.log('No signal result file — pipeline may have failed');
              return;
            }

            if (!result.has_alerts && !result.has_warnings) {
              console.log('All signals OK — no issue needed');
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const severity = result.has_alerts ? '🔴 ALERT' : '⚠️ WARNING';

            let body = `## ${severity} — Signal Check ${date}\n\n`;
            body += `**Composite Gap Score:** ${result.composite_z}σ\n\n`;
            body += `| Signal | Current | Threshold | Status |\n`;
            body += `|--------|---------|-----------|--------|\n`;
            for (const s of result.signals) {
              body += `| ${s.Signal} | ${s.Current} | ${s.Threshold} | ${s.Status} |\n`;
            }
            body += `\n---\n`;
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            body += `*Generated by [Daily Signal Check](${repoUrl}/actions) workflow.*\n`;
            const colabUrl = `https://colab.research.google.com/github/${context.repo.owner}/${context.repo.repo}/blob/main/notebooks/03_market_intelligence_briefing.ipynb`;
            body += `*Run the [Market Intelligence Briefing](${colabUrl}) for full analysis.*`;

            // Check if an issue already exists today
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'signal-alert',
              state: 'open',
              per_page: 5,
            });

            const todayIssue = issues.data.find(i => i.title.includes(date));
            if (todayIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: todayIssue.number,
                body: body,
              });
              console.log(`Updated issue #${todayIssue.number}`);
            } else if (result.has_alerts) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Signal Alert — ${date}`,
                body: body,
                labels: ['signal-alert'],
              });
              console.log('Created new signal alert issue');
            } else {
              console.log('Warnings only — no issue created');
            }
